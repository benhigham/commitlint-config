name: Release

on:
  workflow_run:
    workflows: ['Main']
    branches: [main]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    name: Release
    uses: benhigham/.github/.github/workflows/release-changesets.yml@main
    with:
      node-version: 22
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
